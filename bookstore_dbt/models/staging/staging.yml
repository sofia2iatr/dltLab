version: 2
models:
  - name: stg_authors
    columns:
      - name: author_id
        tests:
          - unique
          - not_null

  - name: stg_books
    columns:
      - name: book_id
        tests:
          - unique
          - not_null
      - name: rating
        tests:
          - not_null
      - name: author_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_authors')
                field: author_id

  - name: stg_orders
    columns:
      - name: order_id
        tests:
          - unique
          - not_null
      - name: book_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_books')
                field: book_id